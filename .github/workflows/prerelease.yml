name: Prerelease
on: [push, pull_request]

jobs:
  build-twoslash-rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64-gnu

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: twoslash-rust

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/rust-twoslash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: twoslash-rust/target/${{ matrix.target }}/release/rust-twoslash
          if-no-files-found: error

  publish:
    needs: build-twoslash-rust
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: twoslash-rust/artifacts

      - name: Build twoslash-rust
        working-directory: twoslash-rust
        run: |
          pnpm build
          pnpm build:npm
        env:
          ARTIFACTS_DIR: artifacts

      - name: Prerelease
        run: | 
          pnpm run build
          pnpm run --filter create-vocs build
          pnpx pkg-pr-new publish --pnpm . ./create-vocs ./twoslash-rust ./twoslash-rust/npm/darwin-arm64 ./twoslash-rust/npm/darwin-x64 ./twoslash-rust/npm/linux-x64-gnu
