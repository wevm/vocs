name: Publish twoslash-rust to crates.io

on:
  push:
    tags: ['twoslash-rust@*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        working-directory: twoslash-rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
