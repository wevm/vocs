packages:
  - .
  - create-vocs
  - site
  - playground
  - twoslash-rust
  - twoslash-rust/npm/*

catalog:
  '@biomejs/biome': ^2.3.10
  '@changesets/cli': ^2.29.8
  '@types/node': ^25.0.3
  '@types/react': ^19.2.7
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': ^6.0.2
  react: ^19.2.3
  react-dom: ^19.2.3
  simple-git-hooks: ^2.13.1
  typescript: ^6.0.2
  vite: ^8.0.14
  vitest: ^4.1.7
  waku: 1.0.0-beta.0
  zile: 0.0.25

overrides:
  '@vocs/twoslash-rust': workspace:*
  create-vocs: workspace:*
  # Pin a single `yaml` version. `yaml` is an optional peer dep of vite, so
  # multiple versions fork vite/waku/plugin-rsc into separate peer-resolved
  # instances, which breaks `instanceof RunnableDevEnvironment` checks
  # (manifests as "[vite-rsc] environment 'ssr' is not runnable").
  yaml: 2.9.0
